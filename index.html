<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="stylesheet" href="./styles/global.css"/>
    <link rel="stylesheet" href="./styles/style.css"/>

    <title>devChallenges.io | Minimal Blog Card</title>
    <main>
      <article>
        <img src="./resources/Cactus.jpg" alt="cactus in a pot"/>
        <div class="card-content">
          <div class="tag">
            <p class="text-preset-1">Design</p>
          </div>
          <div class="card-content-text">
            <h1 class="text-preset-1">Embracing Minimalism</h1>
            <p class="text-preset-2">From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
          </div>
        </div>
        <hr/>
        <p class="author text-preset-3">Annie Spratt</p>
      </article>
      <div class="author-info">
        Coded by DevAmaruk | Challenge by
        <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
          >devChallenges.io</a
        >.
      </div>
    </main>
  </body>
</html>
